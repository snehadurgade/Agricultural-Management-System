<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Transaction Receipt Form</title>
     <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
            max-width: 400px;
            margin: auto;
        }
        h1 {
            color: #333; /* Dark color for the heading */
        }
        label {
            font-size: 16px;
            margin-right: 10px;
        }
        input[type="number"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: calc(100% - 22px); /* Full width minus padding and border */
            margin-bottom: 20px;
        }
        input[type="submit"] {
            background-color: #007bff; /* Blue background for the button */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"]:hover {
            background-color: #0056b3; /* Darker blue on hover */
        }
        </style>
</head>
<body>
<div class="container">
    <h1>Enter Transaction ID</h1>
    <form action="ReceiptServlet" method="get">
        <label for="transactionId">Transaction ID:</label>
        <input type="number" id="transactionId" name="tid" required><br><br>
        <input type="submit" value="Generate Receipt">
    </form>
    </div>
</body>
</html>
